name: "Setup Bun"
description: "Setup Bun with caching and install dependencies"
inputs:
  install-flags:
    description: "Additional flags to pass to 'bun install'"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Get baseline download URL
      id: bun-url
      shell: bash
      run: |
        if [ "$RUNNER_ARCH" = "X64" ]; then
          V=$(node -p "require('./package.json').packageManager.split('@')[1]")
          case "$RUNNER_OS" in
            macOS)   OS=darwin ;;
            Linux)   OS=linux ;;
            Windows) OS=windows ;;
          esac
          echo "url=https://github.com/oven-sh/bun/releases/download/bun-v${V}/bun-${OS}-x64-baseline.zip" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      with:
        bun-version-file: ${{ !steps.bun-url.outputs.url && 'package.json' || '' }}
        bun-download-url: ${{ steps.bun-url.outputs.url }}

    - name: Get cache directory
      id: cache
      shell: bash
      run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

    - name: Cache Bun dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: ${{ steps.cache.outputs.dir }}
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install setuptools for distutils compatibility
      run: python3 -m pip install setuptools || pip install setuptools || true
      shell: bash

    - name: Install dependencies
      env:
        SETUP_BUN_INSTALL_FLAGS: ${{ inputs.install-flags }}
      run: |
        # Workaround for patched peer variants
        # e.g. ./patches/ for standard-openapi
        # https://github.com/oven-sh/bun/issues/28147
        install_flags="${SETUP_BUN_INSTALL_FLAGS:-}"
        case "$install_flags" in
          ""|"--frozen-lockfile"|"--ignore-scripts"|"--production"|"--frozen-lockfile --ignore-scripts"|"--production --frozen-lockfile")
            ;;
          *)
            echo "Unsupported bun install flags: $install_flags" >&2
            exit 1
            ;;
        esac
        read -r -a extra_flags <<< "$install_flags"
        if [ "$RUNNER_OS" = "Windows" ]; then
          bun install --linker hoisted "${extra_flags[@]}"
        else
          bun install "${extra_flags[@]}"
        fi
      shell: bash
