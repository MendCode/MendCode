name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, for example 1.14.39"
        required: true
        type: string
      dry_run:
        description: "Build and attest assets without publishing a GitHub Release"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build release assets
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      attestations: write
      contents: read
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      VERSION: ${{ inputs.version }}
      BUN_INSTALL_CACHE_DIR: /tmp/mendcode-bun-cache
    steps:
      - name: Validate release input
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "version must be semver without leading v: ${VERSION}" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure release runs from main
        if: ${{ inputs.dry_run == false }}
        shell: bash
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME:-}"
          if [ "$branch" != "main" ]; then
            echo "publishing releases is only allowed from main; current ref is ${branch}" >&2
            exit 1
          fi

      - name: Supply-chain preflight
        shell: bash
        run: bash .github/scripts/supply-chain-preflight.sh

      - name: Block vulnerable release dependencies
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/src" \
            ghcr.io/google/osv-scanner:v2.3.8@sha256:64e86bec6df2466feea5137fc7c78fb3b7c21ec077f014d7130f64810e50676b \
            scan --config /src/.github/osv-release.toml --lockfile /src/src/mendcode/bun.lock

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: src/mendcode/package.json

      - name: Install dependencies with frozen lockfile
        working-directory: src/mendcode
        shell: bash
        run: |
          set -euo pipefail
          bun install --frozen-lockfile --ignore-scripts
          bun run --cwd packages/opencode fix-node-pty

      - name: Build release assets
        working-directory: src/mendcode
        shell: bash
        run: |
          set -euo pipefail
          bun run --cwd packages/opencode script/build.ts --release-assets --skip-embed-web-ui
          bash script/check-release-assets.sh

      - name: Write release manifest
        working-directory: src/mendcode/packages/opencode/dist
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "version=${VERSION}"
            echo "repo=${GITHUB_REPOSITORY}"
            echo "sha=${GITHUB_SHA}"
            echo "run=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            cat SHA256SUMS
          } > RELEASE-MANIFEST.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: src/mendcode
          format: spdx-json
          output-file: src/mendcode/packages/opencode/dist/mendcode.spdx.json
          upload-artifact: false

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: |
            src/mendcode/packages/opencode/dist/*.zip
            src/mendcode/packages/opencode/dist/*.tar.gz
            src/mendcode/packages/opencode/dist/SHA256SUMS
            src/mendcode/packages/opencode/dist/RELEASE-MANIFEST.txt
            src/mendcode/packages/opencode/dist/mendcode.spdx.json

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mendcode-release-${{ inputs.version }}
          path: |
            src/mendcode/packages/opencode/dist/*.zip
            src/mendcode/packages/opencode/dist/*.tar.gz
            src/mendcode/packages/opencode/dist/SHA256SUMS
            src/mendcode/packages/opencode/dist/RELEASE-MANIFEST.txt
            src/mendcode/packages/opencode/dist/mendcode.spdx.json
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Create draft GitHub Release
    if: ${{ inputs.dry_run == false }}
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ inputs.version }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: mendcode-release-${{ inputs.version }}
          path: dist

      - name: Create draft GitHub Release
        working-directory: dist
        shell: bash
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          notes="${RUNNER_TEMP}/mendcode-release-notes.md"
          cat > "$notes" <<EOF
          # MendCode ${tag}

          Built from ${GITHUB_SHA}.

          ## Verify

          \`\`\`bash
          gh release download ${tag} --repo ${GITHUB_REPOSITORY}
          shasum -a 256 -c SHA256SUMS
          gh attestation verify --repo ${GITHUB_REPOSITORY} mendcode-*.zip mendcode-*.tar.gz SHA256SUMS RELEASE-MANIFEST.txt mendcode.spdx.json
          \`\`\`
          EOF
          gh release create "$tag" \
            *.zip \
            *.tar.gz \
            SHA256SUMS \
            RELEASE-MANIFEST.txt \
            mendcode.spdx.json \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "$tag" \
            --notes-file "$notes" \
            --draft \
            ${{ inputs.prerelease && '--prerelease' || '' }}
