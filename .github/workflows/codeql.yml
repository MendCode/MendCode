name: CodeQL

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "src/mendcode/packages/web/src/content/docs/**"
      - "src/mendcode/packages/web/public/**"
      - "src/mendcode/packages/web/README.md"
      - "CHANGELOG.md"
      - "ACKNOWLEDGEMENTS.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "SECURITY.md"
      - "SUPPORT.md"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "src/mendcode/packages/web/src/content/docs/**"
      - "src/mendcode/packages/web/public/**"
      - "src/mendcode/packages/web/README.md"
      - "CHANGELOG.md"
      - "ACKNOWLEDGEMENTS.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "SECURITY.md"
      - "SUPPORT.md"
  schedule:
    - cron: "31 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7
        with:
          languages: javascript-typescript
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7
        with:
          category: "/language:javascript-typescript"
